<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Assignment/Shorthand operator - +=,-=,*=,/=,%=,**=
        let a=10
        document.write('<br>A is '+a)
        a+=2 //a=a+2 a=10+2=12
        document.write('<br>A is '+a)
        a*=5 //a=a*5 a=12*5=60
        document.write('<br>A is '+a)
        a**=2 //60*60 
        document.write('<br>A is '+a)

        //Relational/Comparision operator - <,>,<=,>=,==,!=,===,!==
        let x="25"
        let y="25"
        document.write('<br>x > y is '+(x>y)) //34>25 25>25
        document.write('<br>x < y is '+(x<y)) //34<25 25<25
        document.write('<br>x >= y is '+(x>=y))
        document.write('<br>x <= y is '+(x<=y))
        document.write('<br>x == y is '+(x==y)) //check only values
        document.write('<br>x != y is '+(x!=y))
        document.write('<br>x === y is '+(x===y)) //value + datatype both check
        document.write('<br>x !== y is '+(x!==y))
    </script>
</body>
</html>
